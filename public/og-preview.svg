      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#142654"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
